<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scout ZED WebRTC Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111614;
      color: #eef4ef;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid #2b3732;
      background: #18201d;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 650;
    }

    form {
      display: flex;
      flex: 1;
      gap: 8px;
      min-width: 0;
    }

    input, button {
      height: 36px;
      border-radius: 6px;
      border: 1px solid #3b4b45;
      font: inherit;
    }

    input {
      flex: 1;
      min-width: 160px;
      padding: 0 10px;
      background: #0f1412;
      color: #eef4ef;
    }

    button {
      padding: 0 14px;
      background: #d5e8d6;
      color: #102016;
      cursor: pointer;
    }

    main {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      color: #bdd0c4;
      font-size: 14px;
      background: #131a17;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #8b6f3d;
      flex: none;
    }

    .dot.ok {
      background: #55b978;
    }

    .dot.fail {
      background: #d46464;
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: 320px;
      border: 0;
      background: #050706;
    }

    @media (max-width: 720px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      form {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Scout ZED WebRTC</h1>
    <form id="viewer-form">
      <input id="stream-url" name="stream-url" autocomplete="url" spellcheck="false">
      <button type="submit">Open</button>
    </form>
  </header>
  <main>
    <div class="status">
      <span id="status-dot" class="dot"></span>
      <span id="status-text">Enter the robot WebRTC URL.</span>
    </div>
    <iframe id="viewer" title="ZED WebRTC stream"></iframe>
  </main>

  <script>
    const form = document.querySelector("#viewer-form");
    const input = document.querySelector("#stream-url");
    const iframe = document.querySelector("#viewer");
    const dot = document.querySelector("#status-dot");
    const statusText = document.querySelector("#status-text");

    function defaultUrl() {
      const host = window.location.hostname || "<robot-ip-or-tailscale-ip>";
      return `http://${host}:8889/zed/`;
    }

    function setStatus(state, text) {
      dot.className = `dot ${state}`;
      statusText.textContent = text;
    }

    async function openViewer(url) {
      input.value = url;
      iframe.src = url;
      setStatus("", "Checking gateway...");

      try {
        const response = await fetch(url, { method: "HEAD", mode: "no-cors", cache: "no-store" });
        void response;
        setStatus("ok", "Gateway request sent. If the stream is blank, confirm the RTSP stack is running.");
      } catch (error) {
        setStatus("fail", "Gateway did not respond from this browser.");
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      openViewer(input.value.trim());
    });

    input.value = defaultUrl();
  </script>
</body>
</html>
