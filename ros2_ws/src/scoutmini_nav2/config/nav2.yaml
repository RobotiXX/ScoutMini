amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: /scan
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    min_particles: 500
    max_particles: 2000
    laser_model_type: likelihood_field
    max_beams: 60

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /rko_lio/odometry
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    default_nav_to_pose_bt_xml: ''
    default_nav_through_poses_bt_xml: ''
    navigate_to_pose:
      plugin: 'nav2_bt_navigator::NavigateToPoseNavigator'
    navigate_through_poses:
      plugin: 'nav2_bt_navigator::NavigateThroughPosesNavigator'

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    odom_topic: /rko_lio/odometry
    enable_stamped_cmd_vel: false
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ['progress_checker']
    goal_checker_plugins: ['goal_checker']
    controller_plugins: ['FollowPath']

    progress_checker:
      plugin: 'nav2_controller::SimpleProgressChecker'
      required_movement_radius: 0.25
      movement_time_allowance: 10.0

    goal_checker:
      plugin: 'nav2_controller::SimpleGoalChecker'
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true

    FollowPath:
      plugin: 'nav2_mppi_controller::MPPIController'
      time_steps: 40
      model_dt: 0.05
      batch_size: 1000
      iteration_count: 1
      prune_distance: 1.5
      transform_tolerance: 0.2
      vx_max: 0.7
      vx_min: -0.2
      wz_max: 1.5
      ax_max: 1.5
      ax_min: -1.5
      az_max: 2.0
      motion_model: DiffDrive
      visualize: false

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ['GridBased']
    GridBased:
      plugin: 'nav2_smac_planner/SmacPlanner2D'
      tolerance: 0.25
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      motion_model_for_search: MOORE

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6.0
      height: 6.0
      resolution: 0.05
      update_frequency: 10.0
      publish_frequency: 5.0
      # robot_radius: 0.35
      footprint: "[ [0.320, 0.295], [0.320, -0.295], [-0.320, -0.295], [-0.320, 0.295] ]"
      footprint_padding: 0.0
      plugins: ['obstacle_layer', 'inflation_layer']

      obstacle_layer:
        plugin: 'nav2_costmap_2d::ObstacleLayer'
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          max_obstacle_height: 1.5

      inflation_layer:
        plugin: 'nav2_costmap_2d::InflationLayer'
        inflation_radius: 0.60

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      update_frequency: 2.0
      publish_frequency: 1.0
      track_unknown_space: true
      # robot_radius: 0.35
      footprint: "[ [0.320, 0.295], [0.320, -0.295], [-0.320, -0.295], [-0.320, 0.295] ]"
      footprint_padding: 0.0
      
      plugins: ['static_layer', 'obstacle_layer', 'inflation_layer']

      static_layer:
        plugin: 'nav2_costmap_2d::StaticLayer'

      obstacle_layer:
        plugin: 'nav2_costmap_2d::ObstacleLayer'
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          max_obstacle_height: 1.5

      inflation_layer:
        plugin: 'nav2_costmap_2d::InflationLayer'
        inflation_radius: 0.60

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ''

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ['spin', 'backup', 'wait']

    spin:
      plugin: 'nav2_behaviors/Spin'

    backup:
      plugin: 'nav2_behaviors/BackUp'

    wait:
      plugin: 'nav2_behaviors/Wait'

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    feedback: OPEN_LOOP
    enable_stamped_cmd_vel: false
    odom_topic: /rko_lio/odometry
    max_velocity: [0.7, 0.0, 1.5]
    min_velocity: [-0.2, 0.0, -1.5]
    max_accel: [1.5, 0.0, 2.0]
    max_decel: [-1.5, 0.0, -2.0]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - map_server
      - amcl
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
      - velocity_smoother