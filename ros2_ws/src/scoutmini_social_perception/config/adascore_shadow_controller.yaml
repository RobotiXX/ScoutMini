# Controller-only AdaSCoRe social-force parameters for no-motion validation.
# Use with a launch file that remaps cmd_vel away from the live robot command topic.
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    odom_topic: /rko_lio/odometry
    odom_duration: 0.3
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    use_realtime_priority: false
    publish_zero_velocity: true
    enable_stamped_cmd_vel: false

    progress_checker_plugins: ['progress_checker']
    progress_checker:
      plugin: 'nav2_controller::SimpleProgressChecker'
      required_movement_radius: 0.25
      movement_time_allowance: 10.0

    goal_checker_plugins: ['goal_checker']
    goal_checker:
      plugin: 'nav2_controller::SimpleGoalChecker'
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true

    controller_plugins: ['FollowPath']
    FollowPath:
      plugin: 'social_force_window_planner::SFWPlannerNode'
      controller_frame: odom
      robot_base_frame: base_link

      max_trans_vel: 0.5
      min_trans_vel: 0.08
      max_rot_vel: 1.0
      min_rot_vel: 0.2
      max_trans_acc: 0.15
      max_rot_acc: 0.52
      min_in_place_rot_vel: 0.2
      yaw_goal_tolerance: 0.25
      xy_goal_tolerance: 0.25
      wp_tolerance: 1.0
      sim_time: 1.5
      sim_granularity: 0.25
      robot_radius: 0.4
      people_radius: 0.35
      is_circular: true

      sfm_goal_weight: 1.0
      sfm_obstacle_weight: 15.0
      sfm_people_weight: 8.0

      social_weight: 2.0
      costmap_weight: 2.0
      velocity_weight: 0.8
      angle_weight: 0.6
      distance_weight: 1.0

      sensor_interface:
        laser_topic: /scan
        people_topic: /adascore/shadow/people
        odom_topic: /rko_lio/odometry
        max_obstacle_dist: 3.0
        naive_goal_time: 1.0
        people_velocity: 1.7
