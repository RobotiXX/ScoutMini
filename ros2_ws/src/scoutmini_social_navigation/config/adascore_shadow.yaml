adascore_shadow:
  controller_server:
    ros__parameters:
      use_sim_time: false
      controller_frequency: 10.0
      odom_topic: /rko_lio/odometry
      min_x_velocity_threshold: 0.001
      min_y_velocity_threshold: 0.001
      min_theta_velocity_threshold: 0.001
      failure_tolerance: 0.3
      publish_zero_velocity: true
      enable_stamped_cmd_vel: false
      progress_checker_plugins: ['progress_checker']
      progress_checker:
        plugin: nav2_controller::SimpleProgressChecker
        required_movement_radius: 0.25
        movement_time_allowance: 10.0
      goal_checker_plugins: ['goal_checker']
      goal_checker:
        plugin: nav2_controller::SimpleGoalChecker
        xy_goal_tolerance: 0.25
        yaw_goal_tolerance: 0.25
        stateful: true
      controller_plugins: ['FollowPath']
      FollowPath:
        plugin: social_force_window_planner::SFWPlannerNode
        controller_frame: odom
        robot_base_frame: base_link
        max_trans_vel: 0.30
        min_trans_vel: 0.05
        max_rot_vel: 0.60
        min_rot_vel: 0.15
        max_trans_acc: 0.12
        max_rot_acc: 0.40
        robot_radius: 0.40
        people_radius: 0.35
        is_circular: true
        sfm_goal_weight: 1.0
        sfm_obstacle_weight: 15.0
        sfm_people_weight: 8.0
        social_weight: 2.0
        costmap_weight: 2.0
        velocity_weight: 0.8
        angle_weight: 0.6
        distance_weight: 1.0
        sensor_interface:
          laser_topic: /scan
          people_topic: /adascore/shadow/people
          odom_topic: /rko_lio/odometry
          max_obstacle_dist: 3.0
          naive_goal_time: 1.0
          people_velocity: 1.7
  local_costmap:
    local_costmap:
      ros__parameters:
        use_sim_time: false
        global_frame: odom
        robot_base_frame: base_link
        rolling_window: true
        width: 6
        height: 6
        resolution: 0.05
        update_frequency: 10.0
        publish_frequency: 5.0
        footprint: "[ [0.320, 0.295], [0.320, -0.295], [-0.320, -0.295], [-0.320, 0.295] ]"
        plugins: ['obstacle_layer', 'inflation_layer']
        obstacle_layer:
          plugin: nav2_costmap_2d::ObstacleLayer
          observation_sources: scan
          scan:
            topic: /scan
            data_type: LaserScan
            clearing: true
            marking: true
            max_obstacle_height: 1.5
        inflation_layer:
          plugin: nav2_costmap_2d::InflationLayer
          inflation_radius: 0.4
